@if (modalService.isOpen()) {
<div class="modal-backdrop" (click)="onBackdropClick($event)">
  <div class="modal-panel">
    <!-- Header -->
    <div class="flex items-center justify-between px-6 py-4 border-b border-slate-100">
      <h3 class="text-lg font-bold text-slate-900 flex items-center gap-2">
        <span class="material-symbols-outlined text-primary">edit_calendar</span>
        Editar Ingreso Recurrente
      </h3>
      <button (click)="close()"
        class="text-slate-400 hover:text-slate-600 transition-colors rounded-full p-1 hover:bg-slate-100">
        <span class="material-symbols-outlined">close</span>
      </button>
    </div>

    <!-- Body -->
    <div class="p-6">
      @if (modalService.selectedIncome(); as income) {
        <form [formGroup]="editForm" (ngSubmit)="onSubmit()" class="flex flex-col gap-4">
          
          <div class="flex flex-col gap-1.5">
            <label class="text-xs font-semibold text-slate-700">Importe</label>
            <div class="relative group">
              <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
                <span class="text-slate-400 font-black text-sm group-focus-within:text-primary transition-colors">€</span>
              </div>
              <input formControlName="amount" type="number" step="0.01" placeholder="0.00"
                class="block w-full pl-9 pr-4 py-3 bg-slate-50 border border-slate-200 rounded-xl text-slate-900 font-bold focus:ring-2 focus:ring-primary/20 focus:border-primary sm:text-sm transition-all outline-none shadow-sm hover:border-primary/30"
                [class.border-red-400]="editForm.get('amount')?.invalid && editForm.get('amount')?.touched" />
            </div>
          </div>

          <div class="flex flex-col gap-1.5">
            <label class="text-xs font-semibold text-slate-700">Fuente</label>
            <div class="relative group">
              <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
                <span class="material-symbols-outlined text-slate-400 text-lg group-focus-within:text-primary transition-colors">business</span>
              </div>
              <input formControlName="source" type="text" placeholder="Ej. Empresa XYZ"
                class="block w-full pl-11 pr-4 py-3 bg-slate-50 border border-slate-200 rounded-xl text-slate-900 font-medium focus:ring-2 focus:ring-primary/20 focus:border-primary sm:text-sm transition-all outline-none shadow-sm hover:border-primary/30"
                [class.border-red-400]="editForm.get('source')?.invalid && editForm.get('source')?.touched" />
            </div>
          </div>

          <div class="grid grid-cols-2 gap-4">
            <app-select 
              label="Categoría"
              [options]="categoryOptions"
              [value]="editForm.get('category')?.value"
              (valueChange)="editForm.patchValue({category: $event})"
              defaultIcon="category">
            </app-select>

            <app-select 
              label="Frecuencia"
              [options]="frequencyOptions"
              [value]="editForm.get('frequency')?.value"
              (valueChange)="editForm.patchValue({frequency: $event})"
              defaultIcon="event_repeat">
            </app-select>
          </div>

          <div class="flex flex-col gap-1.5">
            <label class="text-xs font-semibold text-slate-700">Descripción (Opcional)</label>
            <input formControlName="description" type="text" placeholder="Ej. Nómina mensual"
              class="block w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl text-slate-900 font-medium focus:ring-2 focus:ring-primary/20 focus:border-primary sm:text-sm transition-all outline-none shadow-sm hover:border-primary/30" />
          </div>

        </form>
      }
    </div>

    <!-- Footer -->
    <div class="bg-slate-50 px-6 py-4 border-t border-slate-200 flex justify-end gap-3">
      <button (click)="close()"
        class="px-5 py-2.5 rounded-lg border border-slate-300 text-slate-700 font-medium hover:bg-white transition-colors focus:ring-2 focus:ring-slate-200">
        Cancelar
      </button>
      <button (click)="onSubmit()"
        [disabled]="isSubmitting || editForm.invalid"
        class="px-5 py-2.5 rounded-lg bg-primary hover:bg-primary-hover text-white font-semibold shadow-lg shadow-primary/25 transition-all transform active:scale-95 focus:ring-2 focus:ring-offset-2 focus:ring-primary disabled:opacity-50 disabled:cursor-not-allowed flex items-center gap-2">
        @if (isSubmitting) {
          <svg class="animate-spin h-4 w-4" viewBox="0 0 24 24" fill="none">
            <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
            <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"></path>
          </svg>
          Guardando...
        } @else {
          Guardar Cambios
        }
      </button>
    </div>
  </div>
</div>
}
