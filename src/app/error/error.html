<div class="bg-background-light font-display min-h-screen flex items-center justify-center px-6 transition-colors duration-200">
  <div class="max-w-md w-full">
    <app-error-state
      title="500"
      message="Error interno del servidor. Ha ocurrido un error inesperado. Nuestro equipo ya ha sido notificado."
      icon="error"
      [showRetry]="false">
    </app-error-state>

    <!-- Unified Action -->
    <div class="mt-4 flex flex-col items-center justify-center gap-4">
      <a [routerLink]="backLink"
        class="inline-flex items-center justify-center gap-2 px-6 py-2.5 bg-primary hover:bg-primary-hover text-white rounded-lg text-sm font-bold transition-all duration-200 shadow-md hover:shadow-lg hover:-translate-y-0.5">
        <span class="material-symbols-outlined text-lg">arrow_back</span>
        Volver
      </a>
      
      <p class="text-[11px] text-slate-400">
        Si el problema persiste, contacta con soporte.
      </p>
    </div>
  </div>
</div>
