<div
  class="bg-background-light dark:bg-background-dark font-display min-h-screen flex items-center justify-center px-6">
  <div class="text-center max-w-md">

    <!-- Animated icon -->
    <div class="relative inline-flex items-center justify-center mb-8">
      <div
        class="absolute w-32 h-32 rounded-full bg-primary/10 dark:bg-primary/5 animate-ping-slow">
      </div>
      <div
        class="relative w-24 h-24 rounded-full bg-primary/15 dark:bg-primary/10 flex items-center justify-center">
        <span class="material-symbols-outlined text-5xl text-primary animate-pulse">
          error
        </span>
      </div>
    </div>

    <!-- Error code -->
    <h1 class="text-7xl font-black text-slate-900 dark:text-white tracking-tighter mb-2">
      500
    </h1>

    <!-- Title -->
    <h2 class="text-xl font-bold text-slate-700 dark:text-slate-200 mb-3">
      Error interno del servidor
    </h2>

    <!-- Description -->
    <p class="text-sm text-slate-500 dark:text-slate-400 leading-relaxed mb-8">
      Ha ocurrido un error inesperado. Nuestro equipo ya ha sido notificado.
      <br />
      Por favor, inténtalo de nuevo más tarde.
    </p>

    <!-- Actions -->
    <div class="flex flex-col sm:flex-row items-center justify-center gap-3">
      <a routerLink="/dashboard"
        class="w-full sm:w-auto inline-flex items-center justify-center gap-2 px-6 py-3 bg-primary hover:bg-primary-hover text-white rounded-xl text-sm font-semibold transition-all duration-200 shadow-lg shadow-primary/25 hover:shadow-xl hover:shadow-primary/30 hover:-translate-y-0.5">
        <span class="material-symbols-outlined text-lg">dashboard</span>
        Volver al Dashboard
      </a>
      <button onclick="window.location.reload()"
        class="w-full sm:w-auto inline-flex items-center justify-center gap-2 px-6 py-3 bg-white dark:bg-white/5 border border-slate-200 dark:border-slate-700 text-slate-700 dark:text-slate-300 rounded-xl text-sm font-semibold transition-all duration-200 hover:bg-slate-50 dark:hover:bg-white/10 hover:-translate-y-0.5">
        <span class="material-symbols-outlined text-lg">refresh</span>
        Reintentar
      </button>
    </div>

    <!-- Subtle footer -->
    <p class="text-[11px] text-slate-400 dark:text-slate-600 mt-12">
      Si el problema persiste, contacta con soporte.
    </p>
  </div>
</div>
