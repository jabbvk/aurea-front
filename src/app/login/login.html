<div class="bg-background-light dark:bg-background-dark min-h-screen flex flex-col font-display">
    <!-- Navigation Header -->
    <header
        class="w-full px-6 lg:px-8 py-3 flex items-center justify-between border-b border-slate-200 dark:border-slate-800 bg-white dark:bg-background-dark">
        <div class="flex items-center gap-2 text-primary">
            <div class="size-7 bg-[#e53e3e]/10 rounded flex items-center justify-center">
                <span class="material-symbols-outlined text-primary" style="font-size: 18px;">shield_person</span>
            </div>
            <h2 class="text-slate-900 dark:text-slate-100 text-base font-bold leading-tight tracking-tight">Portal de
                Acceso</h2>
        </div>
        <button
            routerLink="/help"
            class="flex min-w-[70px] cursor-pointer items-center justify-center rounded-lg h-8 px-3 bg-[#e53e3e]/10 text-primary hover:bg-[#e53e3e]/20 transition-colors text-xs font-semibold">
            <span class="truncate">Ayuda</span>
        </button>
    </header>
    <!-- Main Content Area -->
    <main
        class="flex-grow flex items-center justify-center p-4 lg:p-8 bg-gradient-to-br from-background-light to-slate-200 dark:from-background-dark dark:to-slate-900">
        <div class="w-full max-w-[380px]">
            <!-- Login Card -->
            <div
                class="bg-white dark:bg-slate-900 p-6 rounded-xl shadow-xl shadow-slate-200/50 dark:shadow-none border border-slate-100 dark:border-slate-800">
                <div class="text-center mb-6">
                    <h1 class="text-slate-900 dark:text-slate-100 text-2xl font-bold mb-1.5">Inicio de Sesión</h1>
                    <p class="text-slate-500 dark:text-slate-400 text-xs">Bienvenido de nuevo. Por favor, ingresa tus
                        datos.</p>
                </div>

                <div *ngIf="errorMessage"
                    class="mb-4 p-3 bg-red-50 border border-red-200 text-primary rounded-lg text-xs">
                    {{ errorMessage }}
                </div>

                <form class="space-y-4" [formGroup]="loginForm" (ngSubmit)="onSubmit()">
                    <!-- User Field -->
                    <div class="flex flex-col gap-1">
                        <label class="text-slate-700 dark:text-slate-300 text-xs font-semibold"
                            for="email">Correo</label>
                        <div class="relative group">
                            <span
                                class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-slate-400 group-focus-within:text-primary transition-colors text-lg">
                                email
                            </span>
                            <input
                                class="w-full pl-9 pr-3 py-2 text-sm bg-slate-50 dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-lg focus:ring-2 focus:ring-primary/20 focus:border-primary outline-none transition-all text-slate-900 dark:text-slate-100 placeholder:text-slate-400"
                                id="email" formControlName="email" placeholder="Ingresa tu correo electrónico"
                                type="email" />
                        </div>
                    </div>
                    <!-- Password Field -->
                    <div class="flex flex-col gap-1">
                        <div class="flex justify-between items-center">
                            <label class="text-slate-700 dark:text-slate-300 text-xs font-semibold"
                                for="password">Contraseña</label>
                            <a class="text-primary text-[11px] font-semibold hover:underline" href="#">¿Olvidaste tu
                                contraseña?</a>
                        </div>
                        <div class="relative group">
                            <span
                                class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-slate-400 group-focus-within:text-primary transition-colors text-lg">
                                lock
                            </span>
                            <input
                                class="w-full pl-9 pr-10 py-2 text-sm bg-slate-50 dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-lg focus:ring-2 focus:ring-primary/20 focus:border-primary outline-none transition-all text-slate-900 dark:text-slate-100 placeholder:text-slate-400"
                                id="password" formControlName="password" placeholder="Ingresa tu contraseña"
                                [type]="showPassword ? 'text' : 'password'" />
                            <button
                                (click)="showPassword = !showPassword"
                                class="absolute right-3 top-1/2 -translate-y-1/2 text-slate-400 hover:text-slate-600 dark:hover:text-slate-200 flex items-center justify-center"
                                type="button">
                                <span class="material-symbols-outlined text-[18px]">
                                    {{ showPassword ? 'visibility_off' : 'visibility' }}
                                </span>
                            </button>
                        </div>
                    </div>
                    <!-- Submit Button -->
                    <button [disabled]="isLoading"
                        class="w-full bg-primary hover:bg-primary/90 text-white font-bold py-2.5 rounded-lg shadow-lg shadow-primary/20 transition-all flex items-center justify-center gap-2 text-sm mt-2 disabled:opacity-70 disabled:cursor-not-allowed"
                        type="submit">
                        <span *ngIf="!isLoading">Entrar</span>
                        <span *ngIf="isLoading">Cargando...</span>
                        <span *ngIf="!isLoading" class="material-symbols-outlined text-[16px]">login</span>
                    </button>
                </form>
                <!-- Divider -->
                <div class="relative my-6">
                    <div class="absolute inset-0 flex items-center">
                        <div class="w-full border-t border-slate-200 dark:border-slate-800"></div>
                    </div>
                    <div class="relative flex justify-center text-[10px] uppercase font-semibold tracking-wider">
                        <span class="bg-white dark:bg-slate-900 px-2 text-slate-400">O acceder con</span>
                    </div>
                </div>
                <!-- Secondary Social Logins -->
                <div>
                    <button
                        class="w-full flex items-center justify-center gap-2 py-2 border border-slate-200 dark:border-slate-700 rounded-lg hover:bg-slate-50 dark:hover:bg-slate-800 transition-colors text-slate-700 dark:text-slate-300 text-xs font-medium">
                        <svg class="w-4 h-4" viewbox="0 0 24 24">
                            <path
                                d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"
                                fill="#4285F4"></path>
                            <path
                                d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"
                                fill="#34A853"></path>
                            <path
                                d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"
                                fill="#FBBC05"></path>
                            <path
                                d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 12-4.53z"
                                fill="#EA4335"></path>
                        </svg>
                        Google
                    </button>
                </div>
            </div>
            <!-- Footer links -->
            <div class="mt-6 text-center space-y-2">
                <p class="text-slate-500 dark:text-slate-400 text-xs">
                    ¿No tienes una cuenta?
                    <button type="button" (click)="comingSoonService.open('Registro de Usuarios')" 
                        class="text-primary font-bold hover:underline bg-transparent border-0 p-0 cursor-pointer">Regístrate ahora</button>
                </p>
                <div class="flex items-center justify-center gap-3 pt-3">
                    <a class="text-slate-400 dark:text-slate-600 text-[10px] hover:text-primary transition-colors cursor-pointer"
                        routerLink="/terms">Términos y condiciones</a>
                    <span class="text-slate-300 dark:text-slate-800 text-[10px]">•</span>
                    <a class="text-slate-400 dark:text-slate-600 text-[10px] hover:text-primary transition-colors cursor-pointer"
                        routerLink="/privacy">Privacidad</a>
                </div>
            </div>
        </div>
    </main>
    <!-- Support Bar -->
    <footer
        class="w-full py-3 px-6 text-center text-slate-400 dark:text-slate-600 text-[10px] border-t border-slate-200 dark:border-slate-800 bg-white dark:bg-background-dark">
        © 2024 Portal de Acceso. Todos los derechos reservados.
    </footer>
</div>
