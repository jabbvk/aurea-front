@if (modalService.isOpen()) {
<div class="modal-backdrop" (click)="onBackdropClick($event)">
  <div class="modal-panel">
    <!-- Header -->
    <div class="flex items-center justify-between px-6 py-4 border-b border-slate-100">
      <h3 class="text-lg font-bold text-slate-900 flex items-center gap-2">
        <span class="material-symbols-outlined text-orange-500">error</span>
        {{ modalService.title() }}
      </h3>
      <button (click)="close()"
        class="text-slate-400 hover:text-slate-600 transition-colors rounded-full p-1 hover:bg-slate-100">
        <span class="material-symbols-outlined">close</span>
      </button>
    </div>

    <!-- Body -->
    <div class="p-6">
      <p class="text-slate-600 text-sm leading-relaxed">
        {{ modalService.message() }}
      </p>
    </div>

    <!-- Footer -->
    <div class="bg-slate-50 px-6 py-4 border-t border-slate-200 flex justify-end gap-3">
      <button (click)="close()"
        class="px-6 py-2.5 rounded-lg bg-primary hover:bg-primary-hover text-white font-semibold shadow-lg shadow-primary/25 transition-all transform active:scale-95 focus:ring-2 focus:ring-offset-2 focus:ring-primary flex items-center gap-2">
        Aceptar
      </button>
    </div>
  </div>
</div>
}
