<aside
    class="w-60 h-full bg-white dark:bg-[#1a0c0c] border-r border-slate-200 dark:border-slate-800 flex flex-col justify-between shrink-0 transition-[width] duration-300">
    <div class="p-5">
        <div class="flex items-center gap-2 mb-6">
            <div class="w-7 h-7 rounded bg-primary flex items-center justify-center text-white">
                <span class="material-symbols-outlined text-lg">all_inclusive</span>
            </div>
            <div>
                <h1 class="text-slate-900 dark:text-white text-base font-bold leading-tight">Aurea</h1>
                <p class="text-slate-400 text-[11px] font-normal">Gestión patrimonial</p>
            </div>
        </div>
        <nav class="flex flex-col gap-1">
            <!-- DASHBOARD -->
            <a routerLink="/dashboard"
                class="flex items-center gap-2.5 px-3 py-2 rounded-lg group border-l-4 transition-[background-color,color] duration-200"
                [ngClass]="isActive('/dashboard') 
                    ? 'bg-primary/10 text-primary border-primary' 
                    : 'text-slate-500 hover:bg-slate-50 dark:hover:bg-white/5 hover:text-slate-900 dark:hover:text-white border-white dark:border-[#1a0c0c]'">
                <span class="material-symbols-outlined text-lg"
                    [style.font-variation-settings]="isActive('/dashboard') ? '\'FILL\' 1' : '\'FILL\' 0'">grid_view</span>
                <span class="text-[13px]"
                    [ngClass]="isActive('/dashboard') ? 'font-bold' : 'font-medium'">Dashboard</span>
            </a>

            <!-- EFECTIVO -->
            <a routerLink="/cash"
                class="flex items-center gap-2.5 px-3 py-2 rounded-lg group border-l-4 transition-[background-color,color] duration-200"
                [ngClass]="isActive('/cash') 
                    ? 'bg-primary/10 text-primary border-primary' 
                    : 'text-slate-500 hover:bg-slate-50 dark:hover:bg-white/5 hover:text-slate-900 dark:hover:text-white border-white dark:border-[#1a0c0c]'">
                <span class="material-symbols-outlined text-lg group-hover:scale-110 transition-transform"
                    [style.font-variation-settings]="isActive('/cash') ? '\'FILL\' 1' : '\'FILL\' 0'">account_balance_wallet</span>
                <span class="text-[13px]" [ngClass]="isActive('/cash') ? 'font-bold' : 'font-medium'">Saldo en
                    efectivo</span>
            </a>

            <!-- FONDO EMERGENCIA -->
            <a routerLink="/emergency-fund"
                class="flex items-center gap-2.5 px-3 py-2 rounded-lg group border-l-4 transition-[background-color,color] duration-200"
                [ngClass]="isActive('/emergency-fund') 
                    ? 'bg-primary/10 text-primary border-primary' 
                    : 'text-slate-500 hover:bg-slate-50 dark:hover:bg-white/5 hover:text-slate-900 dark:hover:text-white border-white dark:border-[#1a0c0c]'">
                <span class="material-symbols-outlined text-lg group-hover:scale-110 transition-transform"
                    [style.font-variation-settings]="isActive('/emergency-fund') ? '\'FILL\' 1' : '\'FILL\' 0'">shield</span>
                <span class="text-[13px]" [ngClass]="isActive('/emergency-fund') ? 'font-bold' : 'font-medium'">Fondo de
                    emergencia</span>
            </a>

            <!-- ACTIVOS -->
            <a routerLink="/assets"
                class="flex items-center gap-2.5 px-3 py-2 rounded-lg group border-l-4 transition-[background-color,color] duration-200"
                [ngClass]="isActive('/assets') 
                    ? 'bg-primary/10 text-primary border-primary' 
                    : 'text-slate-500 hover:bg-slate-50 dark:hover:bg-white/5 hover:text-slate-900 dark:hover:text-white border-white dark:border-[#1a0c0c]'">
                <span class="material-symbols-outlined text-lg group-hover:scale-110 transition-transform"
                    [style.font-variation-settings]="isActive('/assets') ? '\'FILL\' 1' : '\'FILL\' 0'">savings</span>
                <span class="text-[13px]" [ngClass]="isActive('/assets') ? 'font-bold' : 'font-medium'">Activos</span>
            </a>

            <!-- INGRESOS -->
            <button (click)="comingSoonService.open('Ingresos')"
                class="flex items-center gap-2.5 px-3 py-2 rounded-lg text-slate-500 hover:bg-slate-50 dark:hover:bg-white/5 hover:text-slate-900 dark:hover:text-white transition-[background-color,color] duration-200 group border-l-4 border-white dark:border-[#1a0c0c] text-left w-full">
                <span
                    class="material-symbols-outlined text-lg group-hover:scale-110 transition-transform">payments</span>
                <span class="text-[13px] font-medium">Ingresos</span>
            </button>

            <!-- GASTOS -->
            <button (click)="comingSoonService.open('Gastos')"
                class="flex items-center gap-2.5 px-3 py-2 rounded-lg text-slate-500 hover:bg-slate-50 dark:hover:bg-white/5 hover:text-slate-900 dark:hover:text-white transition-[background-color,color] duration-200 group border-l-4 border-white dark:border-[#1a0c0c] text-left w-full">
                <span
                    class="material-symbols-outlined text-lg group-hover:scale-110 transition-transform">credit_card</span>
                <span class="text-[13px] font-medium">Gastos</span>
            </button>

            <!-- DEUDAS -->
            <button (click)="comingSoonService.open('Deudas')"
                class="flex items-center gap-2.5 px-3 py-2 rounded-lg text-slate-500 hover:bg-slate-50 dark:hover:bg-white/5 hover:text-slate-900 dark:hover:text-white transition-[background-color,color] duration-200 group border-l-4 border-white dark:border-[#1a0c0c] text-left w-full">
                <span class="material-symbols-outlined text-lg group-hover:scale-110 transition-transform">error</span>
                <span class="text-[13px] font-medium">Deudas</span>
            </button>
        </nav>
    </div>
    <div class="p-4 border-t border-slate-100 dark:border-slate-800">
        <button (click)="comingSoonService.open('Configuración')"
            class="w-full flex items-center gap-2.5 px-3 py-2 rounded-lg text-slate-500 hover:bg-slate-50 dark:hover:bg-white/5 hover:text-slate-900 dark:hover:text-white transition-all duration-200 text-left">
            <span class="material-symbols-outlined text-lg">settings</span>
            <span class="text-[13px] font-medium">Configuración</span>
        </button>
        <div (click)="comingSoonService.open('Perfil de Usuario')"
            class="mt-4 flex items-center gap-3 p-2 rounded-lg hover:bg-slate-50 dark:hover:bg-white/5 cursor-pointer transition-colors">
            <div class="h-7 w-7 rounded-full bg-slate-200 overflow-hidden relative">
                <img alt="Foto de perfil del usuario" class="object-cover w-full h-full"
                    src="https://lh3.googleusercontent.com/aida-public/AB6AXuC1ct0PDquwBlL1kOvC8pUk0Zrh4-tTFG4_QtPdChAATKflxO_L8hllEwCCRliUR74fHLjaXsaCTYcDcYKJ3HBN6O_jxBZ6CJ0GvB-fecChW3C6FVJc62y-qAn-l2ERBKNmkQ6tWJXlvYS105CPOv8EkjbFtUq4pBwygIvoI0iCgk-al-1zISWzM9Mr2sx5sv3I49NSL_uUGlvyPwKdgFVpx5XlyYoAWn1yTGD6LyABtgRNy-6qJvBQV80bob5abLuF0xwsBCqZFb5i" />
            </div>
            <div class="flex-1 overflow-hidden">
                <p class="text-xs font-semibold text-slate-900 dark:text-white truncate">Carlos Rivera</p>
                <p class="text-[10px] text-slate-400 truncate">Pro Plan</p>
            </div>
            <span class="material-symbols-outlined text-slate-400 text-sm">unfold_more</span>
        </div>
    </div>
</aside>
