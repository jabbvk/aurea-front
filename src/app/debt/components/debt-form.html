<form [formGroup]="form" class="space-y-6">
  <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
    <div class="space-y-1">
      <label class="block text-sm font-medium text-slate-700 dark:text-slate-300" for="debt-name">Nombre de la deuda</label>
      <div class="relative">
        <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
          <span class="material-symbols-outlined text-slate-400 text-lg">description</span>
        </div>
        <input formControlName="name" id="debt-name" type="text" placeholder="Ej. Préstamo Coche"
          class="block w-full pl-10 pr-3 py-2.5 border border-slate-200 dark:border-slate-700 rounded-lg text-slate-900 dark:text-white bg-slate-50 dark:bg-[#2a1a1a] focus:ring-2 focus:ring-primary/20 focus:border-primary sm:text-sm transition-colors"
          [class.border-red-400]="form.get('name')?.invalid && form.get('name')?.touched" />
      </div>
      @if (form.get('name')?.invalid && form.get('name')?.touched) {
        <p class="text-xs text-red-500 mt-1">El nombre es obligatorio.</p>
      }
    </div>
    <div class="space-y-1">
      <label class="block text-sm font-medium text-slate-700 dark:text-slate-300" for="debt-amount">Importe total</label>
      <div class="relative">
        <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
          <span class="text-slate-500 font-semibold text-sm">€</span>
        </div>
        <input formControlName="amount" id="debt-amount" type="number" step="0.01" placeholder="0.00"
          class="block w-full pl-8 pr-3 py-2.5 border border-slate-200 dark:border-slate-700 rounded-lg text-slate-900 dark:text-white bg-slate-50 dark:bg-[#2a1a1a] focus:ring-2 focus:ring-primary/20 focus:border-primary sm:text-sm font-semibold transition-colors"
          [class.border-red-400]="form.get('amount')?.invalid && form.get('amount')?.touched" />
      </div>
      @if (form.get('amount')?.hasError('min') && form.get('amount')?.touched) {
        <p class="text-xs text-red-500 mt-1">El importe debe ser mayor a 0.</p>
      }
    </div>
  </div>
  <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
    <div class="space-y-1">
      <label class="block text-sm font-medium text-slate-700 dark:text-slate-300" for="debt-creditor">Acreedor</label>
      <div class="relative">
        <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
          <span class="material-symbols-outlined text-slate-400 text-lg">business</span>
        </div>
        <input formControlName="creditor" id="debt-creditor" type="text" placeholder="Ej. Banco Santander"
          class="block w-full pl-10 pr-3 py-2.5 border border-slate-200 dark:border-slate-700 rounded-lg text-slate-900 dark:text-white bg-slate-50 dark:bg-[#2a1a1a] focus:ring-2 focus:ring-primary/20 focus:border-primary sm:text-sm transition-colors" />
      </div>
    </div>
    <div class="space-y-1">
      <label class="block text-sm font-medium text-slate-700 dark:text-slate-300" for="debt-date">Fecha</label>
      <input formControlName="date" id="debt-date" type="date"
        class="block w-full px-3 py-2.5 border border-slate-200 dark:border-slate-700 rounded-lg text-slate-900 dark:text-white bg-slate-50 dark:bg-[#2a1a1a] focus:ring-2 focus:ring-primary/20 focus:border-primary sm:text-sm transition-colors" />
    </div>
  </div>
  <div class="space-y-1">
    <label class="block text-sm font-medium text-slate-700 dark:text-slate-300" for="debt-description">
      Descripción <span class="text-slate-400 font-normal">(opcional)</span>
    </label>
    <input formControlName="description" id="debt-description" type="text" placeholder="Detalles adicionales..."
      class="block w-full px-3 py-2.5 border border-slate-200 dark:border-slate-700 rounded-lg text-slate-900 dark:text-white bg-slate-50 dark:bg-[#2a1a1a] focus:ring-2 focus:ring-primary/20 focus:border-primary sm:text-sm transition-colors" />
  </div>

  <!-- Origen de los Fondos -->
  <div class="space-y-1">
    <label class="block text-sm font-medium text-slate-700 dark:text-slate-300">
      Origen de los fondos
    </label>
    <div class="grid grid-cols-2 gap-3">
      <label class="relative flex cursor-pointer rounded-lg border p-3 focus:outline-none transition-all duration-200"
        [ngClass]="form.get('source')?.value === 'wallet' ? 'border-primary bg-primary/5 ring-1 ring-primary' : 'border-slate-200 dark:border-slate-700 bg-slate-50 dark:bg-[#2a1a1a] hover:border-slate-300'">
        <input type="radio" formControlName="source" value="wallet" class="sr-only">
        <div class="flex items-center gap-2">
          <span class="material-symbols-outlined text-[20px]" [class.text-primary]="form.get('source')?.value === 'wallet'">payments</span>
          <span class="text-xs font-bold" [class.text-primary]="form.get('source')?.value === 'wallet'">Cuenta Efectivo</span>
        </div>
      </label>
      <label class="relative flex cursor-pointer rounded-lg border p-3 focus:outline-none transition-all duration-200"
        [ngClass]="form.get('source')?.value === 'emergency-fund' ? 'border-primary bg-primary/5 ring-1 ring-primary' : 'border-slate-200 dark:border-slate-700 bg-slate-50 dark:bg-[#2a1a1a] hover:border-slate-300'">
        <input type="radio" formControlName="source" value="emergency-fund" class="sr-only">
        <div class="flex items-center gap-2">
          <span class="material-symbols-outlined text-[20px]" [class.text-primary]="form.get('source')?.value === 'emergency-fund'">savings</span>
          <span class="text-xs font-bold" [class.text-primary]="form.get('source')?.value === 'emergency-fund'">Fondo Emergencia</span>
        </div>
      </label>
    </div>
  </div>
</form>
